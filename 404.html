<!DOCTYPE html>
<html lang="ckb" dir="rtl" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>پەڕە نەدۆزرایەوە | KurdiKebord</title>

    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/fontawesome-all.min.css" rel="stylesheet">
    <link href="assets/css/styles.css" rel="stylesheet">
    <link rel="icon" href="wena/logo/favicon.png">

    <script>
        (function() {
            const saved = localStorage.getItem('ioniq-theme');
            const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.dataset.theme = saved || preferred;
        })();
    </script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .error-logo {
            text-align: center;
            padding: 1rem 0 0.25rem;
        }
        .error-logo a {
            font-weight: 900;
            font-size: 2.4rem;
            line-height: 1;
            text-decoration: none;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoColorCycle 15s ease-in-out infinite;
        }
        html[data-theme="dark"] .error-logo a {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoColorCycleDark 15s ease-in-out infinite;
        }
        @keyframes logoColorCycle {
            0% { filter: hue-rotate(0deg) drop-shadow(0 0 8px rgba(59,130,246,0.5)) drop-shadow(0 0 24px rgba(59,130,246,0.2)); }
            25% { filter: hue-rotate(90deg) drop-shadow(0 0 8px rgba(59,130,246,0.5)) drop-shadow(0 0 24px rgba(59,130,246,0.2)); }
            50% { filter: hue-rotate(180deg) drop-shadow(0 0 8px rgba(59,130,246,0.4)) drop-shadow(0 0 24px rgba(59,130,246,0.15)); }
            75% { filter: hue-rotate(270deg) drop-shadow(0 0 8px rgba(59,130,246,0.5)) drop-shadow(0 0 24px rgba(59,130,246,0.2)); }
            100% { filter: hue-rotate(360deg) drop-shadow(0 0 8px rgba(59,130,246,0.5)) drop-shadow(0 0 24px rgba(59,130,246,0.2)); }
        }
        @keyframes logoColorCycleDark {
            0% { filter: hue-rotate(0deg) drop-shadow(0 0 8px rgba(96,165,250,0.5)) drop-shadow(0 0 24px rgba(96,165,250,0.2)); }
            25% { filter: hue-rotate(90deg) drop-shadow(0 0 8px rgba(96,165,250,0.5)) drop-shadow(0 0 24px rgba(96,165,250,0.2)); }
            50% { filter: hue-rotate(180deg) drop-shadow(0 0 8px rgba(96,165,250,0.4)) drop-shadow(0 0 24px rgba(96,165,250,0.15)); }
            75% { filter: hue-rotate(270deg) drop-shadow(0 0 8px rgba(96,165,250,0.5)) drop-shadow(0 0 24px rgba(96,165,250,0.2)); }
            100% { filter: hue-rotate(360deg) drop-shadow(0 0 8px rgba(96,165,250,0.5)) drop-shadow(0 0 24px rgba(96,165,250,0.2)); }
        }
        .error-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 0 2rem;
        }
        .error-card {
            max-width: 400px;
            margin: 0 auto;
            padding: 2rem 2rem;
            border-radius: 20px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            text-align: center;
        }
        html[data-theme="dark"] .error-card {
            background: #1e1f38;
            border-color: #2d2f4a;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }
        .error-code {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            color: #272556;
            font-family: 'KurdiFont', sans-serif;
            margin-bottom: 0.25rem;
        }
        html[data-theme="dark"] .error-code {
            color: #f5f3ff;
        }
        .error-code .zero-icon {
            display: inline-block;
            vertical-align: super;
            font-size: 3rem;
            line-height: 1;
            animation: floatEmoji 3s ease-in-out infinite;
        }
        @keyframes floatEmoji {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .error-title {
            font-family: 'KurdiFont', sans-serif;
            font-weight: 900;
            font-size: 1.25rem;
            color: #272556;
            margin-bottom: 0.5rem;
        }
        html[data-theme="dark"] .error-title {
            color: #f5f3ff;
        }
        .error-desc {
            color: #565578;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            line-height: 1.7;
        }
        html[data-theme="dark"] .error-desc {
            color: #c4c6df;
        }
        .error-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
        }
        .btn-404 {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 2rem;
            border-radius: 50rem;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            min-width: 220px;
            justify-content: center;
        }
        .btn-404 i {
            font-size: 1.1rem;
        }
        .btn-404-primary {
            background-color: #272556;
            border-color: #272556;
            color: #ffffff;
        }
        .btn-404-primary:hover {
            background-color: transparent;
            color: #272556;
            text-decoration: none;
            transform: translateY(-2px);
        }
        html[data-theme="dark"] .btn-404-primary {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: #ffffff;
        }
        html[data-theme="dark"] .btn-404-primary:hover {
            background-color: transparent;
            color: #60a5fa;
        }
        .btn-404-ghost {
            background-color: transparent;
            border-color: #2ecc71;
            color: #2ecc71;
        }
        .btn-404-ghost:hover {
            background-color: #2ecc71;
            color: #ffffff;
            text-decoration: none;
            transform: translateY(-2px);
        }
        html[data-theme="dark"] .btn-404-ghost {
            border-color: #2ecc71;
            color: #2ecc71;
        }
        html[data-theme="dark"] .btn-404-ghost:hover {
            background-color: #2ecc71;
            color: #ffffff;
        }
        .error-footer {
            padding: 1.5rem 0;
            text-align: center;
            font-size: 0.8125rem;
            color: #565578;
            opacity: 0.7;
            background-color: #f8f9fc;
            transition: all 0.3s ease;
        }
        html[data-theme="dark"] .error-footer {
            background-color: #0f0f1f;
            color: #6b6e8a;
        }
        .error-footer .footer-author {
            color: #2246E6;
            font-weight: 800;
            text-decoration: none;
        }
        .error-footer .footer-author:hover {
            color: #dc3545;
        }
        @media (max-width: 576px) {
            .error-code { font-size: 4rem; }
            .error-code .zero-icon { font-size: 2.5rem; }
            .error-card { padding: 1.5rem 1.25rem; margin: 0 1rem; }
            .btn-404 { min-width: 100%; }
            .error-logo a { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="error-logo">
        <a href="index.html">KurdiKebord</a>
    </div>

    <div class="error-page">
        <div class="container">
            <div class="error-card">
                <div class="error-code">
                <h1 class="error-title">پەڕە نەدۆزرایەوە</h1>
                    <span>4</span>
                    <span class="zero-icon">😢</span>
                    <span>4</span>
                </div>
                <p class="error-desc">لەوانەیە ناونیشانەکەی هەڵە بێت یان سڕابێتەوە<br>بگەڕێرەوە بۆ سەرەتای ماڵپەڕ</p>
                <div class="error-actions">
                    <a class="btn-404 btn-404-primary" href="index.html"><i class="fas fa-home ms-1"></i>لاپەڕەی سەرەکی</a>
                    <a class="btn-404 btn-404-ghost" href="https://play.google.com/store/apps/dev?id=7880948438175101730" target="_blank"><i class="fab fa-google-play ms-1"></i>ئێمە لە گۆگڵ پلەی</a>
                </div>
            </div>
        </div>
    </div>

    <div class="error-footer">
        Designed By <a href="https://facebook.com/Goran9O" target="_blank" class="footer-author">GoRaN</a>
    </div>

    <script src="assets/js/bootstrap.min.js"></script>
</body>
</html>
